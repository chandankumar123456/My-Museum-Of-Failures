name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Backend unit tests
        run: pnpm --filter @museum/backend test
        env:
          JWT_SECRET: ci-only-secret

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # E2E only runs on PRs into main and pushes to main (not on every branch push).
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build frontend
        run: pnpm --filter @museum/frontend build

      - name: Install Playwright browsers
        run: pnpm --filter @museum/frontend exec playwright install --with-deps chromium

      - name: Start frontend
        run: |
          pnpm --filter @museum/frontend start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000

      - name: Run Playwright smoke tests
        run: pnpm --filter @museum/frontend e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          CI: '1'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          retention-days: 7
